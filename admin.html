<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MassFinder Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Source+Sans+3:wght@400;500;600&display=swap">
<style>
/* ── Reset & variables ──────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-primary:#2C3E5A;
  --color-primary-light:#3D5278;
  --color-accent:#B8963F;
  --color-accent-pale:#F5EDD8;
  --color-bg:#F8F7F4;
  --color-surface:#FFFFFF;
  --color-text-primary:#1A1E26;
  --color-text-secondary:#5C6370;
  --color-text-tertiary:#747981;
  --color-verified:#4A7C59;
  --color-verified-bg:#EDF5F0;
  --color-warning:#D97706;
  --color-warning-bg:#FEF5E7;
  --color-error:#B91C1C;
  --color-error-bg:#FEF2F2;
  --color-border:#E5E2DC;
  --color-border-light:#EFECE7;
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'Source Sans 3',system-ui,sans-serif;
  --radius-sm:8px;
  --radius-md:12px;
  --radius-lg:16px;
  --shadow-card:0 1px 3px rgba(26,30,38,.06),0 4px 12px rgba(26,30,38,.04);
  --shadow-elevated:0 4px 16px rgba(26,30,38,.10),0 12px 40px rgba(26,30,38,.08);
}
body{font-family:var(--font-body);background:var(--color-bg);color:var(--color-text-primary);font-size:15px;line-height:1.5}

/* ── Login screen ───────────────────────────────────────────────── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:var(--color-surface);border-radius:var(--radius-lg);padding:40px 36px;width:100%;max-width:380px;box-shadow:var(--shadow-elevated);text-align:center}
.login-card h1{font-family:var(--font-display);color:var(--color-primary);font-size:1.75rem;margin-bottom:6px}
.login-card p{color:var(--color-text-secondary);margin-bottom:28px;font-size:14px}
.login-card input{width:100%;padding:11px 14px;border:1.5px solid var(--color-border);border-radius:var(--radius-sm);font-size:15px;font-family:var(--font-body);outline:none;transition:border-color .15s}
.login-card input:focus{border-color:var(--color-primary)}
.login-card button{margin-top:14px;width:100%;padding:12px;background:var(--color-primary);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:background .15s}
.login-card button:hover{background:var(--color-primary-light,#3D5278)}
.login-error{margin-top:10px;color:var(--color-error);font-size:13px;min-height:18px}

/* ── App shell ──────────────────────────────────────────────────── */
#app{display:none;height:100vh;overflow:hidden}
.app-header{background:var(--color-primary);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.app-header h1{font-family:var(--font-display);font-size:1.2rem;white-space:nowrap}
.app-header .header-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.btn-download{background:var(--color-accent);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-body);white-space:nowrap}
.btn-download:hover{opacity:.9}
.data-meta{font-size:12px;opacity:.7;white-space:nowrap}

/* ── Two-column layout ──────────────────────────────────────────── */
.app-body{display:flex;height:calc(100vh - 53px);overflow:hidden}

/* Parish list column */
.parish-list-col{width:300px;min-width:240px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--color-border);background:var(--color-surface)}
.parish-search-wrap{padding:12px}
.parish-search{width:100%;padding:9px 12px;border:1.5px solid var(--color-border);border-radius:var(--radius-sm);font-size:14px;font-family:var(--font-body);outline:none}
.parish-search:focus{border-color:var(--color-primary)}
#parishList{flex:1;overflow-y:auto}
.parish-row{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--color-border-light);transition:background .1s}
.parish-row:hover{background:var(--color-bg)}
.parish-row.active{background:var(--color-accent-pale);border-left:3px solid var(--color-accent)}
.parish-row.active{padding-left:11px}
.parish-row-name{font-weight:600;font-size:14px;color:var(--color-text-primary)}
.parish-row-sub{font-size:12px;color:var(--color-text-secondary);margin-top:1px}
.parish-row-id{font-size:11px;color:var(--color-text-tertiary);font-family:monospace}

/* Edit column */
.edit-col{flex:1;overflow-y:auto;padding:0 0 60px}

/* ── Empty state ────────────────────────────────────────────────── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60%;color:var(--color-text-tertiary);gap:10px;text-align:center;padding:24px}
.empty-state svg{opacity:.3}

/* ── Edit panel sections ────────────────────────────────────────── */
.edit-header{background:var(--color-primary);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between}
.edit-header h2{font-family:var(--font-display);font-size:1.15rem}
.btn-save{background:var(--color-verified);color:#fff;border:none;border-radius:var(--radius-sm);padding:8px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-body);transition:background .15s}
.btn-save:hover{background:#3d6b4c}
.save-flash{font-size:13px;color:#9fdbba;opacity:0;transition:opacity .3s;pointer-events:none}
.section{padding:20px;border-bottom:1px solid var(--color-border)}
.section-title{font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.06em;color:var(--color-text-secondary);margin-bottom:14px}

/* ── Form grid ──────────────────────────────────────────────────── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.cols-3{grid-template-columns:1fr 1fr 1fr}
.form-grid.cols-1{grid-template-columns:1fr}
.field{display:flex;flex-direction:column;gap:4px}
.field.span-2{grid-column:span 2}
.field label{font-size:12px;font-weight:600;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{padding:8px 10px;border:1.5px solid var(--color-border);border-radius:var(--radius-sm);font-size:14px;font-family:var(--font-body);outline:none;background:var(--color-surface);color:var(--color-text-primary)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--color-primary)}
.field textarea{resize:vertical;min-height:60px}
.check-field{display:flex;align-items:center;gap:8px;padding:8px 0}
.check-field input{width:16px;height:16px;cursor:pointer;accent-color:var(--color-primary)}
.check-field label{font-size:14px;cursor:pointer;color:var(--color-text-primary)}

/* ── Location cards ─────────────────────────────────────────────── */
.loc-card{border:1px solid var(--color-border);border-radius:var(--radius-md);margin-bottom:12px;overflow:hidden}
.loc-card-header{padding:12px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:var(--color-bg);user-select:none}
.loc-card-header:hover{background:#eeecea}
.loc-card-name{font-weight:600;font-size:14px}
.loc-card-addr{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.loc-card-body{padding:14px;display:none;border-top:1px solid var(--color-border);background:var(--color-surface)}
.loc-card-body.open{display:block}
.chevron{transition:transform .2s;font-size:12px;color:var(--color-text-tertiary)}
.loc-card-header.open .chevron{transform:rotate(180deg)}
.btn-add-loc{margin-top:4px;padding:8px 14px;border:1.5px dashed var(--color-border);border-radius:var(--radius-sm);background:transparent;font-size:13px;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-body);width:100%}
.btn-add-loc:hover{border-color:var(--color-primary);color:var(--color-primary)}
.btn-remove{margin-top:12px;padding:6px 12px;background:transparent;border:1px solid #fca5a5;color:var(--color-error);border-radius:var(--radius-sm);font-size:12px;cursor:pointer;font-family:var(--font-body)}
.btn-remove:hover{background:var(--color-error-bg)}

/* ── Service list ───────────────────────────────────────────────── */
.svc-list{display:flex;flex-direction:column;gap:6px}
.svc-row{border:1px solid var(--color-border);border-radius:var(--radius-sm);overflow:hidden}
.svc-row-header{padding:9px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--color-bg);font-size:13px}
.svc-row-header:hover{background:#eeecea}
.svc-badge{background:var(--color-primary);color:#fff;border-radius:99px;padding:2px 8px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0}
.svc-badge.mass{background:#2C3E5A}
.svc-badge.confession{background:#4A7C59}
.svc-badge.adoration{background:#7C4A6E}
.svc-badge.other{background:#6B6B6B}
.svc-meta{color:var(--color-text-secondary);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.svc-body{padding:14px;display:none;border-top:1px solid var(--color-border);background:var(--color-surface)}
.svc-body.open{display:block}
.btn-add-svc{margin-top:8px;padding:8px 14px;border:1.5px dashed var(--color-border);border-radius:var(--radius-sm);background:transparent;font-size:13px;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-body);width:100%}
.btn-add-svc:hover{border-color:var(--color-primary);color:var(--color-primary)}

/* ── Special events ─────────────────────────────────────────────── */
.evt-row{border:1px solid var(--color-border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:6px}
.evt-row-header{padding:9px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;background:var(--color-bg);font-size:13px}
.evt-row-header:hover{background:#eeecea}
.evt-body{padding:14px;display:none;border-top:1px solid var(--color-border);background:var(--color-surface)}
.evt-body.open{display:block}
.btn-add-evt{margin-top:8px;padding:8px 14px;border:1.5px dashed var(--color-border);border-radius:var(--radius-sm);background:transparent;font-size:13px;color:var(--color-text-secondary);cursor:pointer;font-family:var(--font-body);width:100%}
.btn-add-evt:hover{border-color:var(--color-primary);color:var(--color-primary)}

/* ── Proposed changes (Batch 3 hook) ───────────────────────────── */
.proposed-empty{background:var(--color-bg);border:1.5px dashed var(--color-border);border-radius:var(--radius-md);padding:20px;text-align:center;color:var(--color-text-tertiary);font-size:13px}

/* ── Responsive ─────────────────────────────────────────────────── */
@media(max-width:600px){
  .parish-list-col{width:100%}
  .app-body{flex-direction:column}
  .form-grid{grid-template-columns:1fr}
  .form-grid.cols-3{grid-template-columns:1fr 1fr}
  .field.span-2{grid-column:span 1}
}
</style>
</head>
<body>

<!-- ══ LOGIN ════════════════════════════════════════════════════════ -->
<div id="loginScreen">
  <div class="login-card">
    <h1>MassFinder Admin</h1>
    <p>Parish data editor — enter password to continue</p>
    <input id="pwInput" type="password" placeholder="Password" autocomplete="current-password">
    <button onclick="checkPassword()">Enter</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ══ APP ═══════════════════════════════════════════════════════════ -->
<div id="app">
  <div class="app-header">
    <h1>MassFinder Parish Admin</h1>
    <div class="header-right">
      <span class="data-meta" id="dataMeta"></span>
      <button class="btn-download" onclick="downloadJSON()">⬇ Download JSON</button>
    </div>
  </div>

  <div class="app-body">
    <!-- Parish list -->
    <div class="parish-list-col">
      <div class="parish-search-wrap">
        <input class="parish-search" id="parishSearch" type="search" placeholder="Search parishes…" oninput="filterList()">
      </div>
      <div id="parishList"></div>
    </div>

    <!-- Edit panel -->
    <div class="edit-col" id="editCol">
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v10a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z"/><path d="M8 12h8M8 8h5"/></svg>
        <p>Select a parish to begin editing</p>
      </div>
    </div>
  </div>
</div>

<script>
// ── Password gate ────────────────────────────────────────────────────
// NOTE: This is a UI gate only — no server-side writes happen here.
// The password is visible in source; this merely prevents casual access.
const PW = 'xm2215x99=';

function checkPassword() {
  const val = document.getElementById('pwInput').value;
  if (val === PW) {
    sessionStorage.setItem('mf_admin_auth', '1');
    document.getElementById('loginError').textContent = '';
    startApp();
  } else {
    document.getElementById('loginError').textContent = 'Incorrect password.';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });
if (sessionStorage.getItem('mf_admin_auth') === '1') startApp();

// ── Constants (mirrors index.html) ───────────────────────────────────
const SVC_TYPES = {
  sunday_mass:'Sunday Mass', daily_mass:'Daily Mass',
  confession:'Confession', adoration:'Adoration',
  perpetual_adoration:'Perpetual Adoration', holy_hour:'Holy Hour',
  communion_service:'Communion Service', rosary:'Rosary',
  stations_of_cross:'Stations of the Cross', divine_mercy:'Divine Mercy Chaplet',
  miraculous_medal:'Miraculous Medal', novena:'Novena', devotion:'Devotion',
  vespers:'Vespers', anointing_of_sick:'Anointing of the Sick',
  benediction:'Benediction',
  holy_thursday_mass:"Mass of the Lord's Supper",
  good_friday_service:'Celebration of the Passion',
  easter_vigil_mass:'Easter Vigil', bible_study:'Bible Study',
  gorzkie_zale:'Gorzkie Żale', mens_group:"Men's Group",
  social_event:'Social Event'
};
const DAY_VALUES = [
  'sunday','monday','tuesday','wednesday','thursday','friday','saturday',
  'daily','weekday','first_friday','first_saturday','first_sunday',
  'first_thursday','fourth_friday','holyday','holyday_eve','lent',
  'good_friday','holy_thursday','easter_vigil','civil_holiday'
];
const DAY_LABELS = {
  sunday:'Sunday', monday:'Monday', tuesday:'Tuesday', wednesday:'Wednesday',
  thursday:'Thursday', friday:'Friday', saturday:'Saturday',
  daily:'Daily', weekday:'Weekdays', first_friday:'1st Friday',
  first_saturday:'1st Saturday', first_sunday:'1st Sunday',
  first_thursday:'1st Thursday', fourth_friday:'4th Friday',
  holyday:'Holy Day', holyday_eve:'Holy Day Eve', lent:'Lent',
  good_friday:'Good Friday', holy_thursday:'Holy Thursday',
  easter_vigil:'Easter Vigil', civil_holiday:'Civil Holiday'
};
const SEASONS = ['year_round','lent','advent','summer','winter','academic_year','easter_season','ordinary_time','holy_week'];
const LANG_NAMES = {en:'English',es:'Spanish',pl:'Polish',pt:'Portuguese',la:'Latin',fr:'French',vi:'Vietnamese',asl:'ASL'};
const PARISH_STATUSES = ['active','inactive','closed','merged','excluded'];
const VALIDATION_STATUSES = ['verified','manually_verified','low_confidence','needs_verification','unverified','excluded'];
const LOC_TYPES = ['church','chapel','center','cathedral','shrine','school','office','rectory','hall','meeting_room','mission','other'];
const EVT_CATEGORIES = ['fellowship','conference','volunteering','liturgical','educational','outreach','social','devotional','bible_study','recurring','one_time'];
const EVT_FREQUENCIES = ['one_time','weekly','monthly','annual'];
const STATES = ['MA','CT','VT','NH','NY'];

function svcBadgeClass(type) {
  if (['sunday_mass','daily_mass','communion_service'].includes(type)) return 'mass';
  if (type === 'confession') return 'confession';
  if (['adoration','perpetual_adoration','holy_hour'].includes(type)) return 'adoration';
  return 'other';
}

// ── App state ─────────────────────────────────────────────────────────
let editData = null;         // full parish_data.json in memory
let allParishRows = [];      // [{id, name, town}]
let pendingParish = null;    // deep clone of the parish being edited

// ── Boot ─────────────────────────────────────────────────────────────
async function startApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('app').style.flexDirection = 'column';

  try {
    const res = await fetch('parish_data.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    editData = await res.json();
  } catch (e) {
    document.getElementById('editCol').innerHTML =
      '<div class="empty-state" style="color:var(--color-error)">'+
      '<p>Could not load parish_data.json<br><small>'+e.message+'</small><br><small>Try running from a local server or Vercel preview.</small></p></div>';
    return;
  }

  // Meta line
  const meta = editData.metadata || {};
  document.getElementById('dataMeta').textContent =
    (meta.total_parishes || '?') + ' parishes · v' + (meta.schema_version || '?') +
    ' · validated ' + (meta.last_validated || '?');

  // Build list
  allParishRows = (editData.parishes || []).map(p => ({
    id: p.id, name: p.name, town: p.town || '', state: p.state || ''
  }));
  renderList(allParishRows);
}

// ── Parish list ───────────────────────────────────────────────────────
function renderList(rows) {
  const el = document.getElementById('parishList');
  if (!rows.length) { el.innerHTML = '<div style="padding:16px;color:var(--color-text-tertiary);font-size:13px">No matches</div>'; return; }
  el.innerHTML = rows.map(r =>
    '<div class="parish-row" data-id="'+r.id+'" onclick="selectParish(\''+r.id+'\')">' +
      '<div class="parish-row-name">'+ esc(r.name) +'</div>' +
      '<div class="parish-row-sub">'+ esc(r.town) +', '+ esc(r.state) +'</div>' +
      '<div class="parish-row-id">'+ esc(r.id) +'</div>' +
    '</div>'
  ).join('');
}
function filterList() {
  const q = document.getElementById('parishSearch').value.toLowerCase().trim();
  if (!q) { renderList(allParishRows); return; }
  renderList(allParishRows.filter(r =>
    r.name.toLowerCase().includes(q) || r.id.toLowerCase().includes(q) || r.town.toLowerCase().includes(q)
  ));
}

// ── Select parish ─────────────────────────────────────────────────────
function selectParish(id) {
  document.querySelectorAll('.parish-row').forEach(r => r.classList.toggle('active', r.dataset.id === id));
  const parish = (editData.parishes || []).find(p => p.id === id);
  if (!parish) return;
  pendingParish = JSON.parse(JSON.stringify(parish));
  renderEditPanel();
}

// ── Render edit panel ─────────────────────────────────────────────────
function renderEditPanel() {
  const p = pendingParish;
  document.getElementById('editCol').innerHTML =
    editHeader(p) +
    sectionOverview(p) +
    sectionLocations(p) +
    sectionServices(p) +
    sectionSpecialEvents(p) +
    sectionContact(p) +
    sectionValidation(p) +
    sectionProposed();
}

function editHeader(p) {
  return '<div class="edit-header">' +
    '<h2>' + esc(p.name) + '</h2>' +
    '<div style="display:flex;align-items:center;gap:10px">' +
      '<span class="save-flash" id="saveFlash">✓ Saved</span>' +
      '<button class="btn-save" onclick="saveParish()">Save Parish</button>' +
    '</div>' +
  '</div>';
}

// ── Overview section ──────────────────────────────────────────────────
function sectionOverview(p) {
  return '<div class="section">' +
    '<div class="section-title">Parish Overview</div>' +
    '<div class="form-grid">' +
      field('name', 'Parish Name', p.name || '', 'text', 'span-2') +
      field('town', 'Town', p.town || '', 'text') +
      field('county', 'County', p.county || '', 'text') +
      field('state', 'State', '', 'select', '', STATES, p.state) +
      field('zip', 'ZIP', p.zip || '', 'text') +
      field('established', 'Established', p.established || '', 'text') +
      fieldSelect('status', 'Status', PARISH_STATUSES, p.status || 'active') +
      field('bulletin_url', 'Bulletin URL', p.bulletin_url || '', 'text', 'span-2') +
    '</div>' +
    '<div style="margin-top:12px">' +
      checkField('is_mission', 'Is Mission Church', p.is_mission) +
      (p.is_mission ? field('mission_of', 'Mission Of (parish name)', p.mission_of || '', 'text', 'span-2') : '') +
    '</div>' +
  '</div>';
}

// ── Locations section ─────────────────────────────────────────────────
function sectionLocations(p) {
  const locs = p.locations || [];
  let html = '<div class="section"><div class="section-title">Locations (' + locs.length + ')</div>';
  locs.forEach((loc, idx) => {
    html += '<div class="loc-card" id="locCard_'+idx+'">' +
      '<div class="loc-card-header" onclick="toggleLocCard('+idx+')">' +
        '<div><div class="loc-card-name">' + esc(loc.name || loc.id) + '</div>' +
          '<div class="loc-card-addr">' + esc(loc.address || '⚠ No address') + '</div></div>' +
        '<span class="chevron">▼</span>' +
      '</div>' +
      '<div class="loc-card-body" id="locBody_'+idx+'">' +
        '<div class="form-grid">' +
          field('loc_name_'+idx, 'Display Name', loc.name || '', 'text', 'span-2') +
          field('loc_shortname_'+idx, 'Short Name', loc.short_name || '', 'text') +
          fieldSelect('loc_type_'+idx, 'Type', LOC_TYPES, loc.type || 'church') +
          field('loc_address_'+idx, 'Street Address', loc.address || '', 'text', 'span-2') +
          field('loc_city_'+idx, 'City', loc.city || '', 'text') +
          fieldSelect('loc_state_'+idx, 'State', STATES, loc.state || 'MA') +
          field('loc_zip_'+idx, 'ZIP', loc.zip || '', 'text') +
          field('loc_lat_'+idx, 'Latitude', loc.lat !== undefined ? loc.lat : '', 'number') +
          field('loc_lng_'+idx, 'Longitude', loc.lng !== undefined ? loc.lng : '', 'number') +
        '</div>' +
        '<div style="margin-top:10px">' + checkField('loc_accessible_'+idx, 'Wheelchair Accessible', loc.is_accessible) + '</div>' +
        '<button class="btn-remove" onclick="removeLocation('+idx+')">Remove Location</button>' +
      '</div>' +
    '</div>';
  });
  html += '<button class="btn-add-loc" onclick="addLocation()">+ Add Location</button></div>';
  return html;
}
function toggleLocCard(idx) {
  const body = document.getElementById('locBody_' + idx);
  const hdr  = body.previousElementSibling;
  body.classList.toggle('open');
  hdr.classList.toggle('open');
}

// ── Services section ──────────────────────────────────────────────────
function sectionServices(p) {
  const svcs = p.services || [];
  let html = '<div class="section"><div class="section-title">Services (' + svcs.length + ')</div>' +
    '<div class="svc-list" id="svcList">';
  svcs.forEach((s, idx) => { html += renderSvcRow(s, idx, p.locations || []); });
  html += '</div><button class="btn-add-svc" onclick="addService()">+ Add Service</button></div>';
  return html;
}
function renderSvcRow(s, idx, locs) {
  const typeLabel = SVC_TYPES[s.type] || s.type;
  const dayLabel  = s.day ? (DAY_LABELS[s.day] || s.day) : '—';
  const timeLabel = s.time ? fmt12(s.time) : (s.times_vary ? 'times vary' : '—');
  const locName   = s.location_id ? ((locs.find(l => l.id === s.location_id) || {}).short_name || s.location_id) : '';
  const metaParts = [dayLabel, timeLabel, locName].filter(Boolean);
  return '<div class="svc-row">' +
    '<div class="svc-row-header" onclick="toggleSvcRow('+idx+')">' +
      '<span class="svc-badge '+svcBadgeClass(s.type)+'">' + esc(typeLabel) + '</span>' +
      '<span class="svc-meta">' + esc(metaParts.join(' · ')) + (s.seasonal && s.seasonal.is_seasonal ? ' 🍂' : '') + '</span>' +
      '<span style="font-size:11px;color:var(--color-text-tertiary)">▼</span>' +
    '</div>' +
    renderSvcBody(s, idx) +
  '</div>';
}
function renderSvcBody(s, idx) {
  const locs = pendingParish.locations || [];
  const locOpts = [['', '(no specific location)'], ...locs.map(l => [l.id, l.name || l.id])];
  return '<div class="svc-body" id="svcBody_'+idx+'">' +
    '<div class="form-grid cols-3">' +
      fieldSelectPairs('svc_type_'+idx, 'Service Type', Object.entries(SVC_TYPES), s.type || '') +
      fieldSelectPairs('svc_day_'+idx, 'Day', DAY_VALUES.map(d => [d, DAY_LABELS[d] || d]), s.day || '') +
      fieldSelectPairs('svc_lang_'+idx, 'Language', Object.entries(LANG_NAMES), s.language || 'en') +
    '</div>' +
    '<div class="form-grid">' +
      field('svc_time_'+idx, 'Start Time', s.time || '', 'time') +
      field('svc_endtime_'+idx, 'End Time', s.end_time || '', 'time') +
      fieldSelectPairs('svc_locid_'+idx, 'Location', locOpts, s.location_id || '') +
      field('svc_source_'+idx, 'Source', s.source || '', 'text') +
      field('svc_rite_'+idx, 'Rite (if non-Roman)', s.rite || '', 'text') +
      field('svc_id_'+idx, 'Service ID', s.id || '', 'text') +
    '</div>' +
    '<div class="form-grid cols-1">' +
      field('svc_notes_'+idx, 'Notes', s.notes || '', 'text') +
    '</div>' +
    '<div style="margin-top:8px;display:flex;gap:16px;flex-wrap:wrap">' +
      checkField('svc_timesvary_'+idx, 'Times vary (check bulletin)', s.times_vary) +
      checkField('svc_seasonal_'+idx, 'Seasonal', s.seasonal && s.seasonal.is_seasonal) +
    '</div>' +
    '<div id="svcSeasonalMore_'+idx+'" style="margin-top:10px;display:' + ((s.seasonal && s.seasonal.is_seasonal) ? 'block' : 'none') + '">' +
      fieldSelect('svc_season_'+idx, 'Season', SEASONS, (s.seasonal && s.seasonal.season) || 'lent') +
    '</div>' +
    '<button class="btn-remove" onclick="removeService('+idx+')">Remove Service</button>' +
  '</div>';
}
function toggleSvcRow(idx) {
  document.getElementById('svcBody_' + idx).classList.toggle('open');
}

// ── Special events section ────────────────────────────────────────────
function sectionSpecialEvents(p) {
  const evts = p.special_events || [];
  let html = '<div class="section"><div class="section-title">Special Events (' + evts.length + ')</div>';
  evts.forEach((ev, idx) => { html += renderEvtRow(ev, idx); });
  html += '<button class="btn-add-evt" onclick="addEvent()">+ Add Event</button></div>';
  return html;
}
function renderEvtRow(ev, idx) {
  return '<div class="evt-row">' +
    '<div class="evt-row-header" onclick="toggleEvtRow('+idx+')">' +
      '<span class="svc-badge other">' + esc(ev.category || 'event') + '</span>' +
      '<span class="svc-meta">' + esc(ev.title || ev.id) + (ev.frequency ? ' · ' + ev.frequency : '') + '</span>' +
      '<span style="font-size:11px;color:var(--color-text-tertiary)">▼</span>' +
    '</div>' +
    '<div class="evt-body" id="evtBody_'+idx+'">' +
      '<div class="form-grid">' +
        field('evt_title_'+idx, 'Title', ev.title || '', 'text', 'span-2') +
        fieldSelect('evt_cat_'+idx, 'Category', EVT_CATEGORIES, ev.category || 'social') +
        fieldSelect('evt_freq_'+idx, 'Frequency', EVT_FREQUENCIES, ev.frequency || 'one_time') +
        fieldSelectPairs('evt_day_'+idx, 'Day', DAY_VALUES.map(d => [d, DAY_LABELS[d] || d]), ev.day || '') +
        field('evt_time_'+idx, 'Time', ev.time || '', 'text') +
        field('evt_notes_'+idx, 'Notes', ev.notes || '', 'text', 'span-2') +
        field('evt_source_'+idx, 'Source', ev.source || '', 'text') +
        field('evt_id_'+idx, 'Event ID', ev.id || '', 'text') +
      '</div>' +
      '<div style="margin-top:8px">' + checkField('evt_seasonal_'+idx, 'Seasonal', ev.seasonal && ev.seasonal.is_seasonal) + '</div>' +
      '<div id="evtSeasonalMore_'+idx+'" style="margin-top:10px;display:' + ((ev.seasonal && ev.seasonal.is_seasonal) ? 'block' : 'none') + '">' +
        fieldSelect('evt_season_'+idx, 'Season', SEASONS, (ev.seasonal && ev.seasonal.season) || 'lent') +
      '</div>' +
      '<button class="btn-remove" onclick="removeEvent('+idx+')">Remove Event</button>' +
    '</div>' +
  '</div>';
}
function toggleEvtRow(idx) {
  document.getElementById('evtBody_' + idx).classList.toggle('open');
}

// ── Contact section ───────────────────────────────────────────────────
function sectionContact(p) {
  const c = p.contact || {};
  return '<div class="section">' +
    '<div class="section-title">Contact</div>' +
    '<div class="form-grid">' +

// ── Validation section ────────────────────────────────────────────────
function sectionValidation(p) {
  const v = p.validation || {};
  return '<div class="section">' +
    '<div class="section-title">Validation</div>' +
    '<div class="form-grid">' +
      fieldSelect('v_status', 'Status', VALIDATION_STATUSES, v.status || 'needs_verification') +

// ── Proposed changes (Batch 3 placeholder) ────────────────────────────
function sectionProposed() {
  return '<div class="section">' +
    '<div class="section-title">Proposed Changes <span style="font-size:11px;font-weight:400;color:var(--color-text-tertiary);text-transform:none;letter-spacing:0">(Batch 3 — AI-assisted review)</span></div>' +
    '<div class="proposed-empty">No proposed changes for this parish.<br><span style="font-size:12px">The automated Claude validation workflow will surface suggested updates here.</span></div>' +
  '</div>';

// ── Form helpers ──────────────────────────────────────────────────────
function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function field(id, label, value, type, extraClass, opts, selectedVal) {
  if (type === 'select') return fieldSelect(id, label, opts || [], selectedVal || value, extraClass);
  const rows = type === 'textarea' ? ' rows="3"' : '';
  const tag  = type === 'textarea' ? 'textarea' : 'input';
  const val  = type === 'textarea' ? '' : ' value="'+esc(value)+'"';
  const inner = type === 'textarea' ? esc(value) + '</textarea>' : '>';
  return '<div class="field'+(extraClass?' '+extraClass:'')+'">' +
    '<label for="'+id+'">'+label+'</label>' +
    '<'+tag+' id="'+id+'" name="'+id+'"'+(type !== 'textarea' ? ' type="'+type+'"' : '')+val+rows+inner+
  '</div>';
}
function fieldSelect(id, label, opts, selected, extraClass) {
  const options = opts.map(o => '<option value="'+esc(o)+'"'+(o===selected?' selected':'')+'>'+esc(o)+'</option>').join('');
  return '<div class="field'+(extraClass?' '+extraClass:'')+'">' +
    '<label for="'+id+'">'+label+'</label>' +
    '<select id="'+id+'" name="'+id+'">'+options+'</select>' +
  '</div>';
}
function fieldSelectPairs(id, label, pairs, selected, extraClass) {
  const options = pairs.map(p => '<option value="'+esc(p[0])+'"'+(p[0]===selected?' selected':'')+'>'+esc(p[1])+'</option>').join('');
  return '<div class="field'+(extraClass?' '+extraClass:'')+'">' +
    '<label for="'+id+'">'+label+'</label>' +
    '<select id="'+id+'" name="'+id+'">'+options+'</select>' +
  '</div>';
}
function checkField(id, label, checked) {
  return '<div class="check-field">' +
    '<input type="checkbox" id="'+id+'" name="'+id+'"'+(checked?' checked':'')+
    ' onchange="onCheckChange(this)">' +
    '<label for="'+id+'">'+label+'</label>' +
  '</div>';
}
function onCheckChange(el) {
  const id = el.id;
  // Toggle seasonal sub-fields for services/events
  const svcMatch = id.match(/^svc_seasonal_(\d+)$/);
  if (svcMatch) {
    document.getElementById('svcSeasonalMore_' + svcMatch[1]).style.display = el.checked ? 'block' : 'none';
  }
  const evtMatch = id.match(/^evt_seasonal_(\d+)$/);
  if (evtMatch) {
    document.getElementById('evtSeasonalMore_' + evtMatch[1]).style.display = el.checked ? 'block' : 'none';
  }
}
function fmt12(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  const suffix = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return h12 + ':' + String(m).padStart(2,'0') + ' ' + suffix;
}

// ── Add / remove helpers ──────────────────────────────────────────────
function addLocation() {
  pendingParish.locations = pendingParish.locations || [];
  pendingParish.locations.push({ id:'new-location-' + Date.now(), name:'', lat:42.0, lng:-72.5 });
  saveFormToPending();
  renderEditPanel();
  // Open the new card
  const idx = pendingParish.locations.length - 1;
  setTimeout(() => toggleLocCard(idx), 50);
}
function removeLocation(idx) {
  if (!confirm('Remove location "' + (pendingParish.locations[idx].name || pendingParish.locations[idx].id) + '"?')) return;
  saveFormToPending();
  pendingParish.locations.splice(idx, 1);
  renderEditPanel();
}
function addService() {
  pendingParish.services = pendingParish.services || [];
  const now = new Date();
  pendingParish.services.push({
    id: pendingParish.id + '-new-' + now.getTime(),
    type: 'sunday_mass', day: 'sunday', time: '09:00',
    end_time: null, location_id: null, language: 'en', notes: null,
    source: 'bulletin_' + now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0'),
    seasonal: { is_seasonal: false, season: 'year_round' }
  });
  saveFormToPending();
  renderEditPanel();
  const idx = pendingParish.services.length - 1;
  setTimeout(() => toggleSvcRow(idx), 50);
}
function removeService(idx) {
  if (!confirm('Remove this service?')) return;
  saveFormToPending();
  pendingParish.services.splice(idx, 1);
  renderEditPanel();
}
function addEvent() {
  pendingParish.special_events = pendingParish.special_events || [];
  pendingParish.special_events.push({
    id: pendingParish.id + '-evt-' + Date.now(),
    title: '', category: 'social', frequency: 'one_time',
    seasonal: { is_seasonal: false, season: 'year_round' }
  });
  saveFormToPending();
  renderEditPanel();
  const idx = pendingParish.special_events.length - 1;
  setTimeout(() => toggleEvtRow(idx), 50);
}
function removeEvent(idx) {
  if (!confirm('Remove this event?')) return;
  saveFormToPending();
  pendingParish.special_events.splice(idx, 1);
  renderEditPanel();
}

// ── Read form → pendingParish ─────────────────────────────────────────
function val(id) {
  const el = document.getElementById(id);
  if (!el) return null;
  if (el.type === 'checkbox') return el.checked;
  return el.value.trim() || null;
}
function saveFormToPending() {
  if (!pendingParish) return;
  const p = pendingParish;

  // Overview
  p.name         = val('name')         || p.name;
  p.town         = val('town')         || p.town;
  p.county       = val('county')       || null;
  p.state        = val('state')        || p.state;
  p.zip          = val('zip')          || null;
  p.established  = val('established')  || null;
  p.status       = val('status')       || 'active';
  p.bulletin_url = val('bulletin_url') || null;
  p.is_mission   = !!val('is_mission');
  p.mission_of   = p.is_mission ? (val('mission_of') || null) : null;

  // Locations
  (p.locations || []).forEach((loc, idx) => {
    loc.name         = val('loc_name_'+idx)      || loc.name;
    loc.short_name   = val('loc_shortname_'+idx) || null;
    loc.type         = val('loc_type_'+idx)      || 'church';
    loc.address      = val('loc_address_'+idx)   || null;
    loc.city         = val('loc_city_'+idx)      || null;
    loc.state        = val('loc_state_'+idx)     || 'MA';
    loc.zip          = val('loc_zip_'+idx)       || null;
    const lat = parseFloat(document.getElementById('loc_lat_'+idx) && document.getElementById('loc_lat_'+idx).value);
    const lng = parseFloat(document.getElementById('loc_lng_'+idx) && document.getElementById('loc_lng_'+idx).value);
    if (!isNaN(lat)) loc.lat = lat;
    if (!isNaN(lng)) loc.lng = lng;
    loc.is_accessible = val('loc_accessible_'+idx);
  });

  // Services
  (p.services || []).forEach((s, idx) => {
    s.type       = val('svc_type_'+idx)    || s.type;
    s.day        = val('svc_day_'+idx)     || null;
    s.language   = val('svc_lang_'+idx)    || 'en';
    s.time       = val('svc_time_'+idx)    || null;
    s.end_time   = val('svc_endtime_'+idx) || null;
    s.location_id= val('svc_locid_'+idx)   || null;
    s.source     = val('svc_source_'+idx)  || null;
    s.rite       = val('svc_rite_'+idx)    || null;
    s.id         = val('svc_id_'+idx)      || s.id;
    s.notes      = val('svc_notes_'+idx)   || null;
    s.times_vary = !!val('svc_timesvary_'+idx);
    const isSeasonal = !!val('svc_seasonal_'+idx);
    s.seasonal   = { is_seasonal: isSeasonal, season: (isSeasonal ? (val('svc_season_'+idx) || 'lent') : 'year_round') };
  });

  // Special events
  (p.special_events || []).forEach((ev, idx) => {
    ev.title     = val('evt_title_'+idx)  || null;
    ev.category  = val('evt_cat_'+idx)    || null;
    ev.frequency = val('evt_freq_'+idx)   || null;
    ev.day       = val('evt_day_'+idx)    || null;
    ev.time      = val('evt_time_'+idx)   || null;
    ev.notes     = val('evt_notes_'+idx)  || null;
    ev.source    = val('evt_source_'+idx) || null;
    ev.id        = val('evt_id_'+idx)     || ev.id;
    const isSeasonal = !!val('evt_seasonal_'+idx);
    ev.seasonal  = { is_seasonal: isSeasonal, season: (isSeasonal ? (val('evt_season_'+idx) || 'lent') : 'year_round') };
  });

  // Contact
  const c = p.contact || {};
  c.phone           = val('c_phone')       || null;
  c.phone_secondary = val('c_phone2')      || null;
  c.website         = val('c_website')     || null;
  c.office_hours    = val('c_hours')       || null;
  c.office_address  = val('c_office_addr') || null;
  c.instagram       = val('c_instagram')   || null;
  c.facebook        = val('c_facebook')    || null;
  c.notes           = val('c_notes')       || null;
  const emailsRaw = val('c_emails');
  c.emails = emailsRaw ? emailsRaw.split(',').map(e => e.trim()).filter(Boolean) : [];
  p.contact = c;

  // Validation
  const v = p.validation || {};
  v.status       = val('v_status')  || 'needs_verification';
  v.last_checked = val('v_checked') || null;
  v.bulletin_date= val('v_bulletin')|| null;
  if (v.status || v.last_checked) p.validation = v;
}

// ── Save parish back to editData ──────────────────────────────────────
function saveParish() {
  saveFormToPending();
  const idx = editData.parishes.findIndex(p => p.id === pendingParish.id);
  if (idx >= 0) editData.parishes[idx] = JSON.parse(JSON.stringify(pendingParish));
  // Flash
  const flash = document.getElementById('saveFlash');
  if (flash) {
    flash.style.opacity = '1';
    setTimeout(() => { flash.style.opacity = '0'; }, 2000);
  }
  // Refresh list row name in case it changed
  allParishRows = editData.parishes.map(p => ({ id:p.id, name:p.name, town:p.town||'', state:p.state||'' }));
  filterList();
}

// ── Download JSON ─────────────────────────────────────────────────────
function downloadJSON() {
  // Auto-save current parish first
  if (pendingParish) saveParish();
  const json   = JSON.stringify(editData, null, 2);
  const blob   = new Blob([json], { type: 'application/json' });
  const url    = URL.createObjectURL(blob);
  const a      = document.createElement('a');
  a.href       = url;
  a.download   = 'parish_data.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
