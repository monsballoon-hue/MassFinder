  if (target) target.classList.add('active');
}

function onTypeChange() {
  var itype = document.getElementById('ef-type').value;
  var dateWrap = document.getElementById('ef-date-wrap');
  var dateInput = document.getElementById('ef-date');
  var endDateWrap = document.getElementById('ef-enddate-wrap');
  var endDateInput = document.getElementById('ef-enddate');
  var seasonalWrap = document.getElementById('ef-seasonal-wrap');
  var seasonalInput = document.getElementById('ef-seasonal');
  var dayWrap = document.getElementById('ef-day-wrap');
  var dayInput = document.getElementById('ef-day');

  // Service: disable date, enable seasonal + day
  if (itype === 'service') {
    dateWrap.classList.add('disabled');
    dateInput.disabled = true;
    endDateWrap.classList.add('disabled');
    endDateInput.disabled = true;
    seasonalWrap.classList.remove('disabled');
    seasonalInput.disabled = false;
    dayWrap.classList.remove('disabled');
    dayInput.disabled = false;
  }
  // Event: enable date, disable seasonal + day
  else if (itype === 'event') {
    dateWrap.classList.remove('disabled');
    dateInput.disabled = false;
    endDateWrap.classList.remove('disabled');
    endDateInput.disabled = false;
    seasonalWrap.classList.add('disabled');
    seasonalInput.disabled = true;
    seasonalInput.value = '';
    dayWrap.classList.add('disabled');
    dayInput.disabled = true;
    dayInput.value = '';
  }
  // Notice: disable date, seasonal, day
  else {
    dateWrap.classList.add('disabled');
    dateInput.disabled = true;
    endDateWrap.classList.add('disabled');
    endDateInput.disabled = true;
    seasonalWrap.classList.add('disabled');
    seasonalInput.disabled = true;
    seasonalInput.value = '';
    dayWrap.classList.add('disabled');
    dayInput.disabled = true;
    dayInput.value = '';
  }

  // Update category dropdown to highlight relevant group
  var catEl = document.getElementById('ef-category');
  var currentCat = catEl.value;
  var catGroup = getCategoryGroup(currentCat);
  if (catGroup !== itype && catGroup !== 'general') {
    toast('Warning: category "' + currentCat + '" is a ' + catGroup + ' category but type is ' + itype);
  }
}

function onCategoryChange() {
  var cat = document.getElementById('ef-category').value;
  var catGroup = getCategoryGroup(cat);
  var typeEl = document.getElementById('ef-type');
  var currentType = typeEl.value;

  // Auto-sync type if category clearly belongs to a different group
  if (catGroup !== 'general' && catGroup !== currentType) {
    typeEl.value = catGroup;
    onTypeChange();
    toast('Type auto-switched to "' + catGroup + '" to match category');
  }
}

function closeEdit() {
  editingItemId = null;
  var el = document.querySelector('.edit-overlay');
  if (el) el.remove();
}

function getEditValues() {
  var itype = document.getElementById('ef-type').value;
  var tagsRaw = document.getElementById('ef-tags').value;
  var tagsArr = tagsRaw ? tagsRaw.split(',').map(function(t) { return t.trim(); }).filter(Boolean) : [];
  return {
    title: document.getElementById('ef-title').value,
    category: document.getElementById('ef-category').value,
    item_type: itype,
    day: (itype === 'service') ? (document.getElementById('ef-day').value || null) : null,
    recurring: document.getElementById('ef-recurring').value || null,
    event_date: (itype !== 'service') ? (document.getElementById('ef-date').value || null) : null,
    end_date: (itype !== 'service') ? (document.getElementById('ef-enddate').value || null) : null,
    event_time: document.getElementById('ef-time').value || null,
    end_time: document.getElementById('ef-endtime').value || null,
    location: document.getElementById('ef-location').value || null,
    seasonal: (itype === 'service') ? (document.getElementById('ef-seasonal').value || null) : null,
    language: document.getElementById('ef-language').value || null,
    contact_name: document.getElementById('ef-contact').value || null,
    contact_phone: document.getElementById('ef-phone').value || null,
    contact_email: document.getElementById('ef-email').value || null,
    host_parish: document.getElementById('ef-hostparish').value || null,
    tags: tagsArr,
    description: document.getElementById('ef-desc').value || null
  };
}

function validateEdit(vals) {
  var errors = [];
  if (!vals.title || !vals.title.trim()) errors.push({ field: 'ef-title', msg: 'Title is required' });
  if (!vals.category) errors.push({ field: 'ef-category', msg: 'Category is required' });
  if (EDIT_ENUMS.ALL_CATEGORIES.indexOf(vals.category) < 0) errors.push({ field: 'ef-category', msg: 'Invalid category' });
  if (vals.event_time && !/^([01]\d|2[0-3]):[0-5]\d$/.test(vals.event_time)) errors.push({ field: 'ef-time', msg: 'Invalid time format' });
  if (vals.end_time && !/^([01]\d|2[0-3]):[0-5]\d$/.test(vals.end_time)) errors.push({ field: 'ef-endtime', msg: 'Invalid time format' });
  if (vals.event_date && !/^\d{4}-\d{2}-\d{2}$/.test(vals.event_date)) errors.push({ field: 'ef-date', msg: 'Invalid date format' });
  if (vals.end_date && !/^\d{4}-\d{2}-\d{2}$/.test(vals.end_date)) errors.push({ field: 'ef-enddate', msg: 'Invalid date format' });
  if (vals.day && EDIT_ENUMS.DAYS.indexOf(vals.day) < 0) errors.push({ field: 'ef-day', msg: 'Invalid day value' });
  if (vals.item_type === 'service' && !vals.day) errors.push({ field: 'ef-day', msg: 'Day is required for services' });

  // Cross-field consistency warnings (non-blocking)
  var catGroup = getCategoryGroup(vals.category);
  if (vals.item_type === 'service' && catGroup === 'event') {
    toast('Warning: "' + vals.category + '" is an event category but type is service');
  } else if (vals.item_type === 'event' && catGroup === 'service') {
    toast('Warning: "' + vals.category + '" is a service category but type is event');
  }

  return errors;
}

function showEditErrors(errors) {
  // Clear previous errors
  var fields = document.querySelectorAll('.edit-field.error');
  for (var i = 0; i < fields.length; i++) {
    fields[i].classList.remove('error');
    var errEl = fields[i].querySelector('.field-error');
    if (errEl) errEl.remove();
  }
  // Show new errors
  for (var j = 0; j < errors.length; j++) {
    var el = document.getElementById(errors[j].field);
    if (el && el.parentElement) {
      el.parentElement.classList.add('error');
      var span = document.createElement('div');
      span.className = 'field-error';
      span.textContent = errors[j].msg;
      el.parentElement.appendChild(span);
    }
  }
  // Switch to tab containing first error
  if (errors.length > 0) {
    var firstField = document.getElementById(errors[0].field);
    if (firstField) {
      var panel = firstField.closest('.edit-tab-content');
      if (panel && !panel.classList.contains('active')) {
        var tabId = panel.id.replace('etab-', '');
        var tabs = document.querySelectorAll('.edit-tab');
        for (var k = 0; k < tabs.length; k++) {
          if (tabs[k].textContent.toLowerCase() === tabId) {
            switchEditTab(tabId, tabs[k]);
            break;
          }
        }
      }
    }
  }
}

function saveEdit() {
  var vals = getEditValues();
  var errors = validateEdit(vals);
  if (errors.length > 0) { showEditErrors(errors); return; }
  vals.id = editingItemId;
  vals.status = 'approved';
  submitEdit(vals, 'Saved & approved');
}

function saveEditOnly() {
  var vals = getEditValues();
  var errors = validateEdit(vals);
  if (errors.length > 0) { showEditErrors(errors); return; }
  vals.id = editingItemId;
  submitEdit(vals, 'Saved');
}

function submitEdit(vals, msg) {
  fetch('/api/update-item', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(vals)
  }).then(function(r) {
    if (!r.ok) return r.json().then(function(d) { throw new Error(d.error || 'Save failed'); });
    // Update local state
    var item = findItemById(vals.id);
    if (item) {
      Object.keys(vals).forEach(function(k) {
        if (k !== 'id') item[k] = vals[k];
      });
    }
    toast(msg);
    closeEdit();
    renderSidebar();
    updateStats();
    renderMain();
  }).catch(function(err) {
    toast('Error: ' + err.message);
  });
}

function findItemById(id) {
  var needle = Number(id);
  for (var i = 0; i < bulletins.length; i++) {
    for (var j = 0; j < bulletins[i].items.length; j++) {
      if (bulletins[i].items[j].id === needle || bulletins[i].items[j].id === id) return bulletins[i].items[j];
    }
  }
  return null;
}

function escA(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
}

// ── SIDEBAR TOGGLE ──
function toggleSidebar() {
  document.querySelector('.app').classList.toggle('sidebar-collapsed');
}

// ── HELP OVERLAY ──
var helpVisible = false;
function toggleHelp() {
  helpVisible ? closeHelp() : showHelp();
}
function showHelp() {
  helpVisible = true;
  var shortcuts = [
    ['J / ↓', 'Next item'], ['K / ↑', 'Previous item'],
    ['A', 'Approve focused'], ['R', 'Reject focused'],
    ['P', 'Reset to pending'], ['E', 'Edit focused'],
    ['D', 'Toggle Compare view'],
    ['1-9', 'Jump to page'], ['[ / ]', 'Prev / next church'],
    ['Esc', 'Close modal']
  ];
  var html = '<div class="help-overlay" onclick="if(event.target===this)closeHelp()">';
  html += '<div class="help-modal">';
  html += '<h3>Keyboard Shortcuts</h3>';
  html += '<div class="help-grid">';
  shortcuts.forEach(function(s) {
    html += '<span class="help-kbd">' + s[0] + '</span><span class="help-desc">' + s[1] + '</span>';
  });
  html += '</div></div></div>';
  var el = document.createElement('div');
  el.id = 'helpOverlay';
  el.innerHTML = html;
  document.body.appendChild(el.firstElementChild);
}
function closeHelp() {
  helpVisible = false;
  var el = document.querySelector('.help-overlay');
  if (el) el.remove();
}

// ── KEYBOARD ──
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

  if (e.key === '?') { toggleHelp(); return; }
  if (helpVisible && e.key === 'Escape') { closeHelp(); return; }

  // Wizard mode shortcuts
  if (viewMode === 'wizard') {
    var wItems = getWizardItems();
    var wItem = wItems[wizardIndex];
    switch (e.key) {
      case 'j': case 'ArrowDown': case 'ArrowRight':
        e.preventDefault(); wizardNext(); break;
      case 'k': case 'ArrowUp': case 'ArrowLeft':
        e.preventDefault(); wizardPrev(); break;
      case 'a':
        if (wItem) wizardAction('approved'); break;
      case 'r':
        if (wItem) wizardAction('rejected'); break;
      case 'p':
        if (wItem) { wizardAction('pending'); } break;
      case 'e':
        if (wItem) openEdit(wItem.id); break;
      case 'n':
        wizardNextPending(); break;
      case 'd':
        setViewMode('diff'); break;
      case 'Escape':
        if (editingItemId) closeEdit();
        else if (helpVisible) closeHelp();
        break;
      case '[':
        selectChurch(Math.max(currentIdx - 1, 0)); break;
      case ']':
        selectChurch(Math.min(currentIdx + 1, bulletins.length - 1)); break;
    }
    return;
  }

  // Items/Compare mode shortcuts
  var items = getFiltered();

  switch (e.key) {
    case 'j': case 'ArrowDown':
      e.preventDefault();
      setFocus(Math.min(focusedItem + 1, items.length - 1));
      break;
    case 'k': case 'ArrowUp':
      e.preventDefault();
      setFocus(Math.max(focusedItem - 1, 0));
      break;
    case 'a':
      if (focusedItem >= 0 && items[focusedItem]) setStatus(focusedItem, 'approved');
      break;
    case 'r':
      if (focusedItem >= 0 && items[focusedItem]) setStatus(focusedItem, 'rejected');
      break;
    case 'p':
      if (focusedItem >= 0 && items[focusedItem]) setStatus(focusedItem, 'pending');
      break;
    case 'e':
      if (focusedItem >= 0 && items[focusedItem]) openEdit(items[focusedItem].id);
      break;
    case 'd':
      setViewMode(viewMode === 'diff' ? 'wizard' : 'diff');
      break;
    case 'Escape':
      if (editingItemId) closeEdit();
      else if (helpVisible) closeHelp();
      break;
    case '[':
      selectChurch(Math.max(currentIdx - 1, 0));
      break;
    case ']':
      selectChurch(Math.min(currentIdx + 1, bulletins.length - 1));
      break;
    case '1': case '2': case '3': case '4': case '5': case '6': case '7': case '8': case '9':
      var pg = parseInt(e.key);
      if (cur() && pg <= cur().pageCount) goPage(pg);
      break;
  }
});

// ── TOAST ──
var toastTimer;
function toast(msg) {
  var el = document.getElementById('toast');
  el.innerHTML = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 1800);
}

function esc(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

load();
</script>
